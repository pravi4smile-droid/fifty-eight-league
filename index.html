<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thuruppu Game Tracker</title>
<style>
:root {
    --primary: #1e3a5f;
    --accent: #e67e22;
    --green: #27ae60;
    --red: #e74c3c;
    --blue: #3498db;
    --bg: #f0f2f5;
    --card: #ffffff;
    --text: #1a1a1a;
    --muted: #6b7280;
    --border: #e5e7eb;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); margin: 0; color: var(--text); padding-bottom: 70px;
}
.container { max-width: 620px; margin: 0 auto; padding: 12px; }
.header {
    background: var(--primary); color: white; padding: 14px 18px;
    border-radius: 12px; margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
}
.header h1 { margin: 0; font-size: 18px; }
.sync-status { font-size: 11px; padding: 4px 10px; border-radius: 12px; background: rgba(255,255,255,0.15); }
.sync-status.online { background: rgba(39,174,96,0.35); }
.sync-status.offline { background: rgba(230,126,34,0.45); }

.scoreboard-sticky {
    position: sticky; top: 0; z-index: 50;
    background: var(--card); border: 1px solid var(--border); border-radius: 12px;
    padding: 8px 14px; margin-bottom: 12px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.sb-team { text-align: center; flex: 1; }
.sb-label { font-size: 11px; color: var(--muted); }
.sb-score { font-size: 24px; font-weight: 800; }
.sb-score.t1 { color: var(--blue); }
.sb-score.t2 { color: var(--red); }
.sb-vs { font-size: 12px; color: var(--muted); padding: 0 8px; }

.tabbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: var(--card); border-top: 1px solid var(--border);
    display: flex; max-width: 620px; margin: 0 auto;
}
.tabbar button {
    flex: 1; background: none; border: none; padding: 9px 2px 11px;
    font-size: 11px; color: var(--muted); cursor: pointer; font-weight: 600;
}
.tabbar button .ico { display: block; font-size: 17px; margin-bottom: 2px; }
.tabbar button.active { color: var(--primary); }

.card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 16px; margin-bottom: 12px;
}
.card h3 { margin: 0 0 12px 0; font-size: 15px; color: var(--primary); }
label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.3px; }
input, select {
    width: 100%; padding: 11px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 15px; font-family: inherit; background: #fafafa;
}
input:focus, select:focus { outline: none; border-color: var(--primary); background: white; }
.row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.seg { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
.seg button {
    padding: 10px 4px; border: 1.5px solid var(--border); border-radius: 8px;
    background: #fafafa; color: var(--muted); font-weight: 600; font-size: 14px; cursor: pointer;
}
.seg button.on { background: var(--primary); color: white; border-color: var(--primary); }
.seg2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.seg2 button {
    padding: 11px 4px; border: 1.5px solid var(--border); border-radius: 8px;
    background: #fafafa; color: var(--muted); font-weight: 600; font-size: 14px; cursor: pointer;
}
.seg2 button.on-t1 { background: var(--blue); color: white; border-color: var(--blue); }
.seg2 button.on-t2 { background: var(--red); color: white; border-color: var(--red); }
.seg2 button.on-made { background: var(--green); color: white; border-color: var(--green); }
.seg2 button.on-lost { background: var(--red); color: white; border-color: var(--red); }

.btn {
    width: 100%; padding: 13px; border: none; border-radius: 10px;
    background: var(--primary); color: white; font-size: 15px; font-weight: 700; cursor: pointer;
}
.btn:active { transform: scale(0.98); }
.btn.green { background: var(--green); }
.btn.blue { background: var(--blue); }
.btn.subtle { background: #eef1f5; color: var(--primary); }
.btn.small { width: auto; padding: 6px 12px; font-size: 12px; border-radius: 8px; }
.btn.danger { background: var(--red); }

.seat-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
.seat-row .pill {
    font-size: 10px; font-weight: 700; padding: 5px 0; border-radius: 8px; min-width: 52px; text-align: center; flex-shrink: 0;
}
.pill.t1 { background: #e3f0fb; color: var(--blue); }
.pill.t2 { background: #fdecea; color: var(--red); }
.seat-row select { flex: 1; padding: 9px; font-size: 14px; }

.roster-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
    padding: 6px 12px; border-radius: 16px; background: #eef1f5; font-size: 13px; font-weight: 600;
    display: flex; align-items: center; gap: 6px;
}
.chip .x { cursor: pointer; color: var(--red); font-weight: 800; }
.chip .edit { cursor: pointer; color: var(--blue); font-size: 12px; }
.add-row { display: flex; gap: 8px; }
.add-row input { flex: 1; }
.add-row button { width: auto; padding: 0 18px; }

/* Roster rows with guest control */
.roster-list { display: flex; flex-direction: column; }
.roster-item { display: flex; align-items: center; gap: 8px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.roster-item:last-child { border-bottom: none; }
.roster-item .rname { flex: 1; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 6px; overflow: hidden; }
.guest-tag { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; background: #fff4e5; color: #b45309; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; }
.mini-toggle { padding: 4px 10px; border: 1.5px solid var(--border); border-radius: 14px; background: #fafafa; font-size: 11px; font-weight: 700; color: var(--muted); cursor: pointer; flex-shrink: 0; }
.mini-toggle.on { background: #fff4e5; border-color: #f0b866; color: #b45309; }
.mini-btn { width: 30px; height: 30px; border: 1.5px solid var(--border); border-radius: 8px; background: #fafafa; cursor: pointer; font-size: 15px; color: var(--blue); flex-shrink: 0; }
.mini-btn.danger { color: var(--red); font-weight: 800; }
.guest-check { display: inline-flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 13px; font-weight: 600; color: var(--text); text-transform: none; letter-spacing: 0; cursor: pointer; }
.guest-check .box { width: 20px; height: 20px; border: 1.5px solid var(--border); border-radius: 5px; display: inline-flex; align-items: center; justify-content: center; color: #fff; font-size: 13px; }
.guest-check .box.on { background: var(--accent); border-color: var(--accent); }

/* Rectangle table with people around it */
.table-wrap { position: relative; width: 100%; max-width: 380px; margin: 0 auto; aspect-ratio: 3 / 2; }
.table-rect {
    position: absolute; left: 18%; top: 27%; width: 64%; height: 46%;
    border-radius: 14px;
    background: radial-gradient(circle at 35% 30%, #2e7d4f, #1b5e35);
    border: 6px solid #7a4f28;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.85); font-weight: 800; font-size: 12px; letter-spacing: 1.5px; text-align: center;
    box-shadow: inset 0 0 22px rgba(0,0,0,0.35);
}
/* Fixed-size box anchored to a table edge. The icon and name are absolutely
   placed inside it, so the icon's position never depends on the name content
   (it stays put whether the seat is empty or assigned). */
.seat { position: absolute; width: 66px; height: 48px; cursor: pointer; }
.seat.top    { transform: translate(-50%, -100%); }
.seat.bottom { transform: translate(-50%, 0); }
.seat.left   { transform: translate(-100%, -50%); }
.seat.right  { transform: translate(0, -50%); }
.seat .person {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 26px; height: 26px; filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25));
}
.seat .seat-name {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 66px; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    font-size: 10px; font-weight: 700; height: 16px; line-height: 16px; color: var(--text);
    background: rgba(255,255,255,0.9); border-radius: 6px;
}
/* Element nearest the felt on each side (name hugs the table; icon points outward). */
.seat.top .person, .seat.left .person, .seat.right .person { top: 0; }
.seat.top .seat-name, .seat.left .seat-name, .seat.right .seat-name { bottom: 0; }
.seat.bottom .person { bottom: 0; }
.seat.bottom .seat-name { top: 0; }
.seat.t1 .person { color: var(--blue); }
.seat.t2 .person { color: var(--red); }
.seat.empty .person { color: #9aa5b1; }
.seat.empty .seat-name { color: var(--muted); font-weight: 600; background: rgba(255,255,255,0.7); }
/* invisible native select overlaid on each seat so tapping the seat opens a name picker */
.seat-select { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; border: none; background: transparent; -webkit-appearance: none; appearance: none; }
.collapse-btn { display: flex; justify-content: space-between; align-items: center; }
.collapse-btn .chev { font-size: 12px; }
.legend { display: flex; justify-content: center; gap: 18px; margin-top: 10px; font-size: 12px; font-weight: 600; }
.legend .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }

.badge {
    display: inline-block; padding: 3px 10px; border-radius: 12px;
    font-size: 11px; font-weight: 700; margin: 2px 4px 2px 0; background: #eef1f5; color: var(--muted);
}
.badge.made { background: #e6f7ee; color: var(--green); }
.badge.lost { background: #fdecea; color: var(--red); }
.badge.thani { background: #fdf3e6; color: var(--accent); }
.meta { font-size: 12px; color: var(--muted); }
.empty { text-align: center; padding: 40px 16px; color: var(--muted); }
.empty .big { font-size: 34px; margin-bottom: 8px; }
.game-card { border-left: 4px solid var(--border); }
.game-card.win-t1 { border-left-color: var(--blue); }
.game-card.win-t2 { border-left-color: var(--red); }
.week-title {
    display: flex; justify-content: space-between; align-items: center;
    background: var(--primary); color: white; padding: 10px 14px; border-radius: 10px; margin-bottom: 10px;
    font-weight: 700; font-size: 14px;
}
.winner-banner {
    background: linear-gradient(90deg, #f9e8c9, #fdf3e6); border: 1px solid #f0d9ad;
    border-radius: 12px; padding: 14px; text-align: center; margin-bottom: 12px;
}
.winner-banner .wt { font-size: 12px; color: #9a6b1f; font-weight: 700; text-transform: uppercase; }
.winner-banner .wn { font-size: 20px; font-weight: 800; color: #7a4f0e; margin-top: 4px; }

.lb-row { display: flex; align-items: center; gap: 10px; padding: 9px 0; border-bottom: 1px solid var(--border); }
.lb-row:last-child { border-bottom: none; }
.lb-rank { width: 26px; height: 26px; border-radius: 50%; background: #eef1f5; color: var(--muted);
    display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 12px; flex-shrink: 0; }
.lb-rank.r1 { background: #ffd700; color: #7a4f0e; }
.lb-rank.r2 { background: #d9dde3; color: #555; }
.lb-rank.r3 { background: #e8b98a; color: #6b3f12; }
.lb-name { flex: 1; font-weight: 600; font-size: 14px; }
.lb-pts { font-weight: 800; font-size: 15px; }
.lb-sub { font-size: 11px; color: var(--muted); }

.tally-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.tally-row .tname { flex: 1; font-weight: 600; font-size: 14px; }
.tally-row input { width: 90px; text-align: center; padding: 8px; }

textarea { width: 100%; min-height: 140px; padding: 10px; border: 1px solid var(--border); border-radius: 8px; font-family: monospace; font-size: 11px; }
.login-overlay {
    position: absolute; top: 0; left: 0; right: 0; min-height: 100vh; z-index: 500;
    background: var(--bg); display: flex; align-items: flex-start; justify-content: center; padding-top: 12vh;
}
.login-box {
    background: var(--card); border: 1px solid var(--border); border-radius: 16px;
    padding: 28px 24px; width: 90%; max-width: 360px; text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}
.login-box .logo { font-size: 40px; margin-bottom: 6px; }
.login-box h2 { margin: 0 0 4px; color: var(--primary); font-size: 20px; }
.login-box .sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
.login-box input { margin-bottom: 10px; text-align: center; }
.login-err { color: var(--red); font-size: 13px; font-weight: 600; min-height: 18px; margin-bottom: 8px; }
.toast {
    position: fixed; bottom: 78px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--text); color: white; padding: 10px 20px; border-radius: 24px;
    font-size: 13px; font-weight: 600; opacity: 0; transition: all 0.25s; z-index: 200; pointer-events: none;
    max-width: 90%; text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.hint { font-size: 12px; color: var(--muted); margin-top: 6px; }

/* Matchup (teams per game week) */
.matchup { display: flex; align-items: stretch; gap: 8px; margin-top: 10px; }
.matchup .team { flex: 1; background: #f7f8fa; border-radius: 10px; padding: 10px; text-align: center; }
.matchup .team.t1 { border-top: 3px solid var(--blue); }
.matchup .team.t2 { border-top: 3px solid var(--red); }
.matchup .team.win { background: #eef7f0; }
.matchup .team .tlabel { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; }
.matchup .team.t1 .tlabel { color: var(--blue); }
.matchup .team.t2 .tlabel { color: var(--red); }
.matchup .team .tscore { font-size: 26px; font-weight: 800; margin: 2px 0; }
.matchup .team .tplayers { font-size: 12px; color: var(--text); line-height: 1.35; }
.matchup .vs { align-self: center; font-size: 12px; color: var(--muted); font-weight: 700; }
.score-caption { text-align: center; font-size: 11px; color: var(--muted); margin-top: 6px; }

/* Add past game day */
.past-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.past-row .past-name { flex: 1; font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; }
.past-seg { width: 116px; flex-shrink: 0; }
.past-seg button { padding: 8px 4px; font-size: 13px; }
.past-pts { width: 68px; flex-shrink: 0; padding: 8px; text-align: center; }
.past-pts-empty { width: 68px; flex-shrink: 0; }
.badge.manual { background: #eae6fb; color: #6b46c1; }

/* 12-0 rounds: King Maker / Joker badges */
.ko-round { border: 1px solid var(--border); border-radius: 10px; padding: 10px; margin-bottom: 10px; background: #fafafa; }
.ko-head { display: flex; justify-content: space-between; align-items: center; }
.ko-jokers { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
.chip-toggle { display: inline-flex; align-items: center; gap: 4px; padding: 6px 12px; border-radius: 16px; border: 1.5px solid var(--border); background: #fff; font-size: 13px; font-weight: 600; color: var(--muted); cursor: pointer; }
.chip-toggle.on { background: #e6f7ee; border-color: var(--green); color: var(--green); }
.lb-badges { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 12px; }
.lb-badges span { display: inline-flex; align-items: center; gap: 3px; font-size: 13px; font-weight: 700; color: var(--text); }

/* Leaderboard table */
.lb-sort, .lb-view { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); margin-bottom: 12px; flex-wrap: wrap; }
.lb-sort button, .lb-view button { padding: 5px 12px; border: 1.5px solid var(--border); border-radius: 8px; background: #fafafa; font-weight: 600; font-size: 12px; color: var(--muted); cursor: pointer; }
.lb-sort button.on, .lb-view button.on { background: var(--primary); color: #fff; border-color: var(--primary); }
.wk-table th, .wk-table td { min-width: 46px; }
.wk-bonus { color: var(--accent); font-weight: 700; font-size: 11px; margin-left: 1px; }
.wk-empty { color: var(--muted); }
.lb-table-wrap { overflow-x: auto; }
.lb-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.lb-table th, .lb-table td { padding: 8px 5px; text-align: center; border-bottom: 1px solid var(--border); white-space: nowrap; }
.lb-table thead th { font-size: 10px; text-transform: uppercase; letter-spacing: 0.3px; color: var(--muted); font-weight: 700; vertical-align: middle; }
.lb-table th.col-name, .lb-table td.col-name { text-align: left; white-space: normal; }
.lb-table td.col-name { font-weight: 600; }
.lb-table td.lb-pts-cell { font-weight: 800; }
.lb-table .sorted { background: #f2f6fc; }
.lb-table thead th.sorted { color: var(--primary); }
.lb-table thead th.sortable { cursor: pointer; user-select: none; -webkit-user-select: none; }
.lb-table thead th.sortable:hover { color: var(--primary); }
.lb-table .sort-caret { font-size: 9px; }
.lb-table tbody tr:last-child td { border-bottom: none; }
.lb-table .lb-rank { display: inline-flex; }

/* King Maker / Joker / lifted-Joker outline icons */
.ic { width: 22px; height: 22px; vertical-align: -6px; flex-shrink: 0; }
.ic-sm { width: 16px; height: 16px; vertical-align: -3px; }
.ic-king { color: #d4a017; }
.ic-joker { color: #6b46c1; }
.ic-cross { color: var(--red); }
.ic-stack { position: relative; display: inline-block; width: 22px; height: 22px; vertical-align: -6px; flex-shrink: 0; }
.ic-stack.ic-sm { width: 16px; height: 16px; vertical-align: -3px; }
.ic-stack .ic { position: absolute; inset: 0; width: 100%; height: 100%; vertical-align: 0; }

/* 12-0 rounds summary on a week card (one line per round) */
.ko-summary { margin-top: 8px; border-top: 1px dashed var(--border); padding-top: 8px; }
.ko-summary-title { font-size: 10px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; text-align: center; margin-bottom: 4px; }
.ko-line { font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 5px; flex-wrap: wrap; margin: 3px 0; }
.ko-rn { font-weight: 700; color: var(--muted); }
.ko-line .ko-t1 { color: var(--blue); font-weight: 700; }
.ko-line .ko-t2 { color: var(--red); font-weight: 700; }
.ko-lift { display: inline-flex; align-items: center; gap: 3px; color: var(--text); }
</style>
</head>
<body>
<div class="login-overlay" id="login-overlay" style="display:none;">
    <div class="login-box">
        <div class="logo">&#127924;</div>
        <h2>Fifty Eight League</h2>
        <div class="sub">Thuruppu weekly score tracker</div>
        <input id="login-user" type="text" placeholder="Username" autocomplete="username">
        <input id="login-pass" type="password" placeholder="Password" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <div class="login-err" id="login-err"></div>
        <button class="btn" onclick="doLogin()">Sign in</button>
    </div>
</div>
<div class="container">
    <div class="header">
        <h1>&#127924; Thuruppu Tracker</h1>
        <span class="sync-status" id="sync-status">Connecting...</span>
    </div>
    <div id="tab-season"></div>
    <div id="tab-roster" style="display:none;"></div>
    <div id="tab-data" style="display:none;"></div>
</div>

<div class="tabbar">
    <button class="active" data-tab="season" onclick="switchTab('season')"><span class="ico">&#127942;</span>Season</button>
    <button data-tab="roster" onclick="switchTab('roster')"><span class="ico">&#128101;</span>Roster</button>
    <button data-tab="data" onclick="switchTab('data')"><span class="ico">&#128190;</span>Data</button>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '/api/data';
let saveTimer = null;

/* Outline badge icons (stroke = currentColor; colour set via .ic-* class). */
const ICON_KING = '<svg class="ic ic-king" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true"><path d="M3 7l4 4 5-6 5 6 4-4-2 12H5L3 7z"/><path d="M5 20h14"/></svg>';
const ICON_JOKER = '<svg class="ic ic-joker" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M5 13h14a1.7 1.7 0 0 1 1.7 1.7v.6A1.7 1.7 0 0 1 19 17H5a1.7 1.7 0 0 1-1.7-1.7v-.6A1.7 1.7 0 0 1 5 13z"/><path d="M7.2 13 3.6 6.9 8.9 10z"/><path d="M9.9 12 12 4.3 14.1 12z"/><path d="M16.8 13 20.4 6.9 15.1 10z"/><circle cx="3" cy="6" r="1.5"/><circle cx="12" cy="3.4" r="1.5"/><circle cx="21" cy="6" r="1.5"/></svg>';
const ICON_CROSS = '<svg class="ic ic-cross" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" aria-hidden="true"><path d="M6 6l12 12M18 6L6 18"/></svg>';
// Lifted Joker = the cross sits on top of the Joker icon.
function iconCrossed(sm) { return '<span class="ic-stack' + (sm ? ' ic-sm' : '') + '" title="Joker lifted">' + ICON_JOKER + ICON_CROSS + '</span>'; }

let state = {
    data: { season: [], roster: [], guests: [] },
    newGuest: false,
    activeTab: 'season',
    newPlayerName: '',
    lbSort: 'points',
    lbView: 'ranking',
    showPast: false,
    past: { date: '', team: {}, score1: '', score2: '', points: {}, ko: [] },
    editWeek: null,
    editBuf: null
};

/* ---------- persistence ---------- */
// Each game week carries a stable id used as its storage key (one blob per week).
function genId() {
    return 'w' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}
function ensureWeekIds() {
    (state.data.season || []).forEach(w => { if (!w.id) w.id = genId(); });
}
function localLoad() {
    try {
        const saved = localStorage.getItem('thuruppu-data');
        if (saved) state.data = JSON.parse(saved);
        if (!state.data.roster) state.data.roster = state.data.savedPlayers || [];
        if (!state.data.guests) state.data.guests = [];
    } catch (e) {}
    ensureWeekIds();
}
function localSave() {
    try {
        localStorage.setItem('thuruppu-data', JSON.stringify(state.data));
    } catch (e) {}
}
/* ---------- auth ---------- */
function getToken() { try { return localStorage.getItem('thuruppu-token') || ''; } catch (e) { return ''; } }
function setToken(t) { try { t ? localStorage.setItem('thuruppu-token', t) : localStorage.removeItem('thuruppu-token'); } catch (e) {} }
function authHeaders() { return { 'Content-Type': 'application/json', 'x-auth-token': getToken() }; }

function showLogin(show) {
    document.getElementById('login-overlay').style.display = show ? 'flex' : 'none';
}

async function doLogin() {
    const username = document.getElementById('login-user').value.trim();
    const password = document.getElementById('login-pass').value;
    const err = document.getElementById('login-err');
    err.textContent = '';
    try {
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const out = await res.json();
        if (out.ok && out.token) {
            setToken(out.token);
            showLogin(false);
            toast('Welcome!');
            serverLoad();
        } else {
            err.textContent = out.error || 'Wrong username or password';
        }
    } catch (e) {
        err.textContent = 'Cannot reach server. Check connection.';
    }
}

function logout() {
    setToken('');
    showLogin(true);
    toast('Signed out');
}

async function serverLoad() {
    if (!getToken()) { showLogin(true); setOnline(false); render(); return; }
    try {
        const res = await fetch(API, { headers: authHeaders() });
        if (res.status === 401) { showLogin(true); setOnline(false); render(); return; }
        if (!res.ok) throw new Error();
        const serverData = await res.json();
        if (serverData.season && serverData.season.length > 0) {
            state.data = serverData;
            if (!state.data.roster) state.data.roster = [];
            if (!state.data.guests) state.data.guests = [];
            ensureWeekIds();
            localSave();
        } else if (state.data.season.length > 0 || (state.data.roster && state.data.roster.length)) {
            serverSave();
        }
        setOnline(true);
    } catch (e) { setOnline(false); }
    render();
}
function serverSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(async () => {
        try {
            const res = await fetch(API, { method: 'POST', headers: authHeaders(), body: JSON.stringify(state.data) });
            if (res.status === 401) { showLogin(true); setOnline(false); return; }
            if (!res.ok) {
                let msg = 'save failed (' + res.status + ')';
                try { const j = await res.json(); if (j && j.error) msg = j.error; } catch (e) {}
                setOnline(false, msg);
                return;
            }
            setOnline(true);
        } catch (e) { setOnline(false, 'network error'); }
    }, 400);
}
let wasOnline = null;
function setOnline(on, detail) {
    const el = document.getElementById('sync-status');
    el.textContent = on ? 'Synced to server' : 'Offline - saved on device';
    el.className = 'sync-status ' + (on ? 'online' : 'offline');
    if (detail) el.title = detail;
    // Surface the reason once when a save first drops offline, so it's diagnosable.
    if (!on && detail && wasOnline !== false) toast('Save not synced: ' + detail);
    wasOnline = on;
}
function persist() { localSave(); serverSave(); }

/* ---------- helpers ---------- */
function toast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2400);
}
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
function round2(n) { return Math.round(n * 100) / 100; }

/* ---------- roster ---------- */
function isGuest(name) { return (state.data.guests || []).includes(name); }
function guestTag(name) { return isGuest(name) ? ' <span class="guest-tag">Guest</span>' : ''; }
function toggleNewGuest() { state.newGuest = !state.newGuest; renderRosterTab(); }
function toggleGuest(name) {
    if (!state.data.guests) state.data.guests = [];
    if (isGuest(name)) state.data.guests = state.data.guests.filter(g => g !== name);
    else state.data.guests.push(name);
    persist();
    render();
    toast(name + (isGuest(name) ? ' marked as guest' : ' is now a regular'));
}
function addRosterPlayer() {
    const input = document.getElementById('new-player');
    const name = (input ? input.value : '').trim();
    if (!name) return;
    if (state.data.roster.includes(name)) { toast(name + ' is already in the roster'); return; }
    state.data.roster.push(name);
    state.data.roster.sort((a,b) => a.localeCompare(b));
    if (state.newGuest && !isGuest(name)) state.data.guests.push(name);
    persist();
    render();
    toast(name + (state.newGuest ? ' added as guest' : ' added to roster'));
}
function removeRosterPlayer(name) {
    if (!confirm('Remove ' + name + ' from roster? (Past game history is kept)')) return;
    state.data.roster = state.data.roster.filter(p => p !== name);
    state.data.guests = (state.data.guests || []).filter(g => g !== name);
    if (state.past && state.past.team) delete state.past.team[name];
    persist();
    render();
}
function renameRosterPlayer(oldName) {
    const newName = (prompt('Rename "' + oldName + '" to:', oldName) || '').trim();
    if (!newName || newName === oldName) return;
    if (state.data.roster.includes(newName)) { toast(newName + ' is already in the roster'); return; }
    const map = s => (s === oldName ? newName : s);

    state.data.roster = state.data.roster.map(map).sort((a, b) => a.localeCompare(b));
    state.data.guests = (state.data.guests || []).map(map);

    if (state.past) {
        if (state.past.team && state.past.team[oldName] !== undefined) {
            state.past.team[newName] = state.past.team[oldName]; delete state.past.team[oldName];
        }
        if (state.past.points && state.past.points[oldName] !== undefined) {
            state.past.points[newName] = state.past.points[oldName]; delete state.past.points[oldName];
        }
    }

    // Propagate the rename through all recorded history so stats stay attached.
    state.data.season.forEach(w => {
        if (w.players) {
            w.players.team1 = (w.players.team1 || []).map(map);
            w.players.team2 = (w.players.team2 || []).map(map);
        }
        (w.games || []).forEach(g => { g.team1 = (g.team1 || []).map(map); g.team2 = (g.team2 || []).map(map); });
        (w.rounds || []).forEach(r => { r.winnerPlayers = (r.winnerPlayers || []).map(map); });
        (w.koRounds || []).forEach(r => { r.crossed = (r.crossed || []).map(map); });
        if (w.finalTally && w.finalTally[oldName] !== undefined) {
            w.finalTally[newName] = w.finalTally[oldName]; delete w.finalTally[oldName];
        }
    });

    persist();
    render();
    toast('Renamed ' + oldName + ' to ' + newName);
}

/* ---------- add a past game day ---------- */
function togglePastForm() {
    state.showPast = !state.showPast;
    if (state.showPast && !state.past.date) state.past.date = new Date().toISOString().split('T')[0];
    renderSeasonTab();
}
function setPastDate(v) { state.past.date = v; }
function setPastTeam(name, team) {
    state.past.team[name] = (state.past.team[name] === team) ? null : team;
    renderSeasonTab();
}
// Randomly split everyone currently picked (assigned to either team) into two
// balanced teams. A player is "in today's game" once they have T1 or T2 set.
function randomTeams() {
    const playing = state.data.roster.filter(p => state.past.team[p] === 'team1' || state.past.team[p] === 'team2');
    if (playing.length < 2) { toast('Tap T1 or T2 to pick who played, then Shuffle'); return; }
    for (let i = playing.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [playing[i], playing[j]] = [playing[j], playing[i]];
    }
    const half = Math.ceil(playing.length / 2);
    playing.forEach((p, idx) => { state.past.team[p] = idx < half ? 'team1' : 'team2'; });
    renderSeasonTab();
    toast('Teams shuffled: ' + half + ' vs ' + (playing.length - half));
}
function setPastPoints(name, v) { state.past.points[name] = v; }
function setPastScore(which, v) { state.past['score' + which] = v; }

/* ---------- 12-0 rounds: King Maker / Joker badges ----------
   Buffer shape per round: { winner: 'team1'|'team2', crossed: { name: true } }.
   ctx is 'past' (new day form) or 'edit' (edit-week form). */
function koBuf(ctx) { return ctx === 'past' ? state.past.ko : state.editBuf.ko; }
function addKoRound(ctx) { koBuf(ctx).push({ winner: 'team1', crossed: {} }); renderSeasonTab(); }
function removeKoRound(ctx, i) { koBuf(ctx).splice(i, 1); renderSeasonTab(); }
function setKoWinner(ctx, i, team) { const r = koBuf(ctx)[i]; r.winner = team; r.crossed = {}; renderSeasonTab(); }
function toggleKoCrossed(ctx, i, name) { const c = koBuf(ctx)[i].crossed; c[name] = !c[name]; renderSeasonTab(); }

// Convert the editor buffer into stored koRounds, keeping only crossed players
// who are actually on the losing team.
function koRoundsFromBuf(ctx, team1, team2) {
    return koBuf(ctx).map(r => {
        const losers = r.winner === 'team1' ? team2 : team1;
        const crossed = losers.filter(p => r.crossed[p]);
        return { winner: r.winner, crossed };
    });
}

function koEditorHtml(ctx, team1, team2) {
    const ko = koBuf(ctx);
    const rows = ko.map((r, i) => {
        const winTeam = r.winner === 'team1' ? team1 : team2;
        const loseTeam = r.winner === 'team1' ? team2 : team1;
        const jokers = loseTeam.length
            ? loseTeam.map(p => {
                const arg = "'" + esc(p).replace(/'/g, "\\'") + "'";
                const on = !!r.crossed[p];
                return '<button class="chip-toggle' + (on ? ' on' : '') + '" onclick="toggleKoCrossed(\'' + ctx + '\',' + i + ',' + arg + ')">' + (on ? iconCrossed(true) : ICON_JOKER.replace('ic ic-joker', 'ic ic-sm ic-joker')) + esc(p) + '</button>';
            }).join('')
            : '<span class="meta">no players on the losing team</span>';
        return '<div class="ko-round">' +
            '<div class="ko-head"><strong>12-0 round ' + (i + 1) + '</strong>' +
            '<button class="btn danger small" onclick="removeKoRound(\'' + ctx + '\',' + i + ')">Remove</button></div>' +
            '<div class="seg2" style="margin:8px 0;">' +
            '<button class="' + (r.winner === 'team1' ? 'on-t1' : '') + '" onclick="setKoWinner(\'' + ctx + '\',' + i + ',\'team1\')">Team 1 won 12-0</button>' +
            '<button class="' + (r.winner === 'team2' ? 'on-t2' : '') + '" onclick="setKoWinner(\'' + ctx + '\',' + i + ',\'team2\')">Team 2 won 12-0</button>' +
            '</div>' +
            '<div class="hint">' + ICON_KING.replace('ic ic-king', 'ic ic-sm ic-king') + ' King Maker (+2 each): ' + (winTeam.length ? winTeam.map(esc).join(', ') : '—') + '</div>' +
            '<div class="hint" style="margin-top:6px;">' + ICON_JOKER.replace('ic ic-joker', 'ic ic-sm ic-joker') + ' Jokers &mdash; tap anyone who lifted theirs:</div>' +
            '<div class="ko-jokers">' + jokers + '</div>' +
            '</div>';
    }).join('');
    const canUse = team1.length && team2.length;
    return '<div style="margin-top:14px;">' +
        '<label>12-0 rounds (King Maker / Joker)</label>' +
        '<div class="hint" style="margin-bottom:8px;">Add a round here <strong>only if it ended 12-0</strong>. The winning team each get a King Maker badge; the losers each get a Joker &mdash; tap any loser who lifted theirs. Add one per 12-0 round (a week can have several).</div>' +
        (canUse
            ? rows + '<button class="btn subtle" onclick="addKoRound(\'' + ctx + '\')">+ Add a 12-0 round</button>'
            : '<div class="meta">Assign both teams first to add 12-0 rounds.</div>') +
        '</div>';
}

function renumberSeason() {
    state.data.season.sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
    state.data.season.forEach((w, i) => { w.week = i + 1; });
}

function savePastDay() {
    if (!state.past.date) { toast('Pick a date first'); return; }
    const team1 = [], team2 = [];
    state.data.roster.forEach(p => {
        const t = state.past.team[p];
        if (t === 'team1') team1.push(p);
        else if (t === 'team2') team2.push(p);
    });
    if (!team1.length || !team2.length) { toast('Assign at least one player to each team'); return; }

    const s1 = parseFloat(state.past.score1), s2 = parseFloat(state.past.score2);
    const teamScores = { team1: isNaN(s1) ? 0 : s1, team2: isNaN(s2) ? 0 : s2 };

    // Everyone on a team gets that team's score for the week, unless an
    // individual override was entered for that player.
    const finalTally = {};
    team1.forEach(p => { const v = parseFloat(state.past.points[p]); finalTally[p] = isNaN(v) ? teamScores.team1 : v; });
    team2.forEach(p => { const v = parseFloat(state.past.points[p]); finalTally[p] = isNaN(v) ? teamScores.team2 : v; });

    const rounds = [];
    if (teamScores.team1 !== teamScores.team2) {
        const winner = teamScores.team1 > teamScores.team2 ? 'team1' : 'team2';
        rounds.push({ winner, winnerPlayers: (winner === 'team1' ? team1 : team2).slice() });
    }

    const koRounds = koRoundsFromBuf('past', team1, team2);

    const week = {
        id: genId(),
        week: state.data.season.length + 1,
        date: state.past.date, manual: true, completed: true,
        games: [], players: { team1, team2 }, teamScores, rounds, finalTally, koRounds
    };

    state.data.season.push(week);
    renumberSeason();
    state.past = { date: '', team: {}, score1: '', score2: '', points: {}, ko: [] };
    state.showPast = false;
    persist(); render();
    toast('Game day saved for ' + week.date);
}

/* ---------- edit a previous week's points ---------- */
function editWeekOpen(idx) {
    const w = state.data.season[idx];
    const ft = w.finalTally || {};
    const points = {};
    weekPlayers(w).forEach(p => {
        // For manual weeks, leave a player's box blank when their stored value is
        // just the team-score default, so editing the team score re-propagates.
        let show = (ft[p] !== undefined) ? String(ft[p]) : '';
        if (w.manual) {
            const teamScore = (w.players.team1 || []).includes(p) ? w.teamScores.team1 : w.teamScores.team2;
            if (ft[p] === teamScore) show = '';
        }
        points[p] = show;
    });
    // Load existing 12-0 rounds into the editor buffer (crossed array -> map).
    const ko = (w.koRounds || []).map(r => {
        const crossed = {};
        (r.crossed || []).forEach(p => { crossed[p] = true; });
        return { winner: r.winner, crossed };
    });
    state.editWeek = idx;
    state.editBuf = {
        score1: w.manual ? String(w.teamScores.team1) : '',
        score2: w.manual ? String(w.teamScores.team2) : '',
        points, ko
    };
    renderSeasonTab();
}
function editWeekCancel() { state.editWeek = null; state.editBuf = null; renderSeasonTab(); }
function setEditScore(which, v) { state.editBuf['score' + which] = v; }
function setEditPoints(name, v) { state.editBuf.points[name] = v; }
function editWeekSave() {
    const idx = state.editWeek;
    const w = state.data.season[idx];
    if (!w) { editWeekCancel(); return; }

    if (w.manual) {
        const s1 = parseFloat(state.editBuf.score1), s2 = parseFloat(state.editBuf.score2);
        w.teamScores = { team1: isNaN(s1) ? 0 : s1, team2: isNaN(s2) ? 0 : s2 };
        const ft = {};
        (w.players.team1 || []).forEach(p => { const v = parseFloat(state.editBuf.points[p]); ft[p] = isNaN(v) ? w.teamScores.team1 : v; });
        (w.players.team2 || []).forEach(p => { const v = parseFloat(state.editBuf.points[p]); ft[p] = isNaN(v) ? w.teamScores.team2 : v; });
        w.finalTally = ft;
        w.rounds = [];
        if (w.teamScores.team1 !== w.teamScores.team2) {
            const winner = w.teamScores.team1 > w.teamScores.team2 ? 'team1' : 'team2';
            w.rounds.push({ winner, winnerPlayers: (winner === 'team1' ? w.players.team1 : w.players.team2).slice() });
        }
    } else {
        const ft = {};
        weekPlayers(w).forEach(p => { const v = parseFloat(state.editBuf.points[p]); if (!isNaN(v)) ft[p] = v; });
        w.finalTally = ft;
    }

    w.koRounds = koRoundsFromBuf('edit', w.players.team1 || [], w.players.team2 || []);

    state.editWeek = null; state.editBuf = null;
    persist(); render();
    toast('Week ' + w.week + ' updated');
}

/* ---------- actions ---------- */
function switchTab(name) {
    state.activeTab = name;
    state.editWeek = null; state.editBuf = null;
    ['season','roster','data'].forEach(t => {
        document.getElementById('tab-' + t).style.display = t === name ? 'block' : 'none';
    });
    document.querySelectorAll('.tabbar button').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
    render();
    window.scrollTo(0, 0);
}
function setLbSort(mode) { state.lbSort = mode; renderSeasonTab(); }
function setLbView(mode) { state.lbView = mode; renderSeasonTab(); }

function exportData() {
    const json = JSON.stringify(state.data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'thuruppu-backup-' + new Date().toISOString().split('T')[0] + '.json';
    a.click();
    URL.revokeObjectURL(url);
    toast('Backup downloaded');
}
function importData(ev) {
    const file = ev.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
        try {
            state.data = JSON.parse(e.target.result);
            if (!state.data.roster) state.data.roster = [];
            if (!state.data.guests) state.data.guests = [];
            ensureWeekIds();
            persist(); render();
            toast('Data imported');
        } catch (err) { toast('Import failed: invalid JSON'); }
    };
    reader.readAsText(file);
}
function copyJson() {
    navigator.clipboard.writeText(JSON.stringify(state.data, null, 2)).then(
        () => toast('Copied to clipboard'), () => toast('Copy not available'));
}

/* ---------- rendering ---------- */
function renderRosterTab() {
    const guestCount = (state.data.guests || []).length;
    const rosterList = state.data.roster.length
        ? '<div class="roster-list">' + state.data.roster.map(p => {
            const arg = "'" + esc(p).replace(/'/g, "\\'") + "'";
            const g = isGuest(p);
            return '<div class="roster-item">' +
                '<span class="rname">' + esc(p) + (g ? ' <span class="guest-tag">Guest</span>' : '') + '</span>' +
                '<button class="mini-toggle' + (g ? ' on' : '') + '" title="Toggle guest" onclick="toggleGuest(' + arg + ')">Guest</button>' +
                '<button class="mini-btn" title="Rename" onclick="renameRosterPlayer(' + arg + ')">&#9998;</button>' +
                '<button class="mini-btn danger" title="Remove" onclick="removeRosterPlayer(' + arg + ')">&times;</button>' +
                '</div>';
        }).join('') + '</div>'
        : '<div class="meta">No players yet. Add your regulars once &mdash; they will be remembered across game nights.</div>';

    document.getElementById('tab-roster').innerHTML =
        '<div class="card"><h3>Roster (' + state.data.roster.length + ' players' + (guestCount ? ', ' + guestCount + ' guest' + (guestCount > 1 ? 's' : '') : '') + ')</h3>' +
        '<div class="hint" style="margin-bottom:12px;">Your players. Tap <strong>Guest</strong> to mark someone as a guest, &#9998; to rename (updates past games too), or &times; to remove. Removing keeps past game history.</div>' +
        rosterList +
        '<div class="add-row" style="margin-top:14px;">' +
        '<input id="new-player" type="text" placeholder="Add player name" onkeydown="if(event.key===\'Enter\')addRosterPlayer()">' +
        '<button class="btn" onclick="addRosterPlayer()">Add</button></div>' +
        '<label class="guest-check" onclick="toggleNewGuest()"><span class="box' + (state.newGuest ? ' on' : '') + '">' + (state.newGuest ? '&#10003;' : '') + '</span> Add as guest</label>' +
        '</div>';
}

function weekPlayers(week) {
    const set = new Set();
    (week.players ? week.players.team1.concat(week.players.team2) : []).forEach(p => set.add(p));
    week.games.forEach(g => { g.team1.concat(g.team2).forEach(p => set.add(p)); });
    return Array.from(set);
}

function pastFormHtml() {
    if (!state.showPast) {
        return '<div class="card"><button class="btn subtle" onclick="togglePastForm()">&#128197; Add a game day</button>' +
            '<div class="hint">Record a week &mdash; pick the date, set the teams and each team\'s end-of-week score.</div></div>';
    }
    if (state.data.roster.length < 2) {
        return '<div class="card"><h3>Add a game day</h3>' +
            '<div class="meta">Add at least two players in the <strong>Roster</strong> tab first.</div>' +
            '<button class="btn subtle" style="margin-top:10px;" onclick="togglePastForm()">Cancel</button></div>';
    }
    const rows = state.data.roster.map(p => {
        const t = state.past.team[p];
        const arg = "'" + esc(p).replace(/'/g, "\\'") + "'";
        return '<div class="past-row">' +
            '<span class="past-name">' + esc(p) + '</span>' +
            '<div class="seg2 past-seg">' +
            '<button class="' + (t === 'team1' ? 'on-t1' : '') + '" onclick="setPastTeam(' + arg + ',\'team1\')">T1</button>' +
            '<button class="' + (t === 'team2' ? 'on-t2' : '') + '" onclick="setPastTeam(' + arg + ',\'team2\')">T2</button>' +
            '</div>' +
            (t
                ? '<input class="past-pts" type="number" step="any" title="Leave blank to use the team score" placeholder="team" value="' + (state.past.points[p] !== undefined ? esc(state.past.points[p]) : '') + '" oninput="setPastPoints(' + arg + ',this.value)">'
                : '<span class="past-pts-empty"></span>') +
            '</div>';
    }).join('');

    const pT1 = state.data.roster.filter(p => state.past.team[p] === 'team1');
    const pT2 = state.data.roster.filter(p => state.past.team[p] === 'team2');

    return '<div class="card"><h3>Add a game day</h3>' +
        '<label>Game date</label>' +
        '<input type="date" value="' + esc(state.past.date) + '" max="' + new Date().toISOString().split('T')[0] + '" onchange="setPastDate(this.value)">' +
        '<label style="margin-top:14px;">Team score for the week</label>' +
        '<div class="hint" style="margin-bottom:10px;">This score is given to <strong>every player on the team</strong> for the leaderboard.</div>' +
        '<div class="row">' +
        '<div><label>Team 1 score</label><input type="number" step="any" value="' + esc(state.past.score1) + '" oninput="setPastScore(1, this.value)"></div>' +
        '<div><label>Team 2 score</label><input type="number" step="any" value="' + esc(state.past.score2) + '" oninput="setPastScore(2, this.value)"></div>' +
        '</div>' +
        '<label style="margin-top:14px;">Who played &amp; on which team?</label>' +
        '<div class="hint" style="margin-bottom:10px;">Tap T1 or T2 to pick who played (either side) &mdash; then hit <strong>Shuffle</strong> to split them into two random teams, or set the teams by hand. The points box is optional: leave it blank to use the team score, or type a number to override just that player.</div>' +
        '<button class="btn subtle" style="margin-bottom:10px;" onclick="randomTeams()">&#127922; Shuffle into random teams</button>' +
        rows +
        koEditorHtml('past', pT1, pT2) +
        '<button class="btn green" style="margin-top:14px;" onclick="savePastDay()">Save game day</button>' +
        '<button class="btn subtle" style="margin-top:8px;" onclick="togglePastForm()">Cancel</button>' +
        '</div>';
}

function renderSeasonTab() {
    const season = state.data.season;
    let html = pastFormHtml();

    if (season.length === 0) {
        html += '<div class="card"><div class="empty"><div class="big">&#127942;</div>Season stats will appear here once you start playing.</div></div>';
    } else {
        // Per-player aggregates
        const stats = {};
        function stat(p) {
            if (!stats[p]) stats[p] = { points: 0, roundWins: 0, weeks: 0, tallied: false, kings: 0, jokers: 0, crossed: 0 };
            return stats[p];
        }
        season.forEach(w => {
            const t1 = (w.players && w.players.team1) || [];
            const t2 = (w.players && w.players.team2) || [];
            const ko = w.koRounds || [];
            weekPlayers(w).forEach(p => stat(p).weeks++);
            // Round wins: for a manually-entered week the recorded 12-0 rounds are
            // its rounds (each is a win for its team); otherwise use the round log.
            if (w.manual && ko.length) {
                ko.forEach(r => (r.winner === 'team1' ? t1 : t2).forEach(p => stat(p).roundWins++));
            } else {
                (w.rounds || []).forEach(r => r.winnerPlayers.forEach(p => stat(p).roundWins++));
            }
            if (w.finalTally) Object.entries(w.finalTally).forEach(([p, v]) => { stat(p).points += v; stat(p).tallied = true; });
            // King Maker / Joker badges from 12-0 rounds.
            ko.forEach(r => {
                const kings = r.winner === 'team1' ? t1 : t2;
                const losers = r.winner === 'team1' ? t2 : t1;
                kings.forEach(p => { stat(p).kings++; });
                losers.forEach(p => { stat(p).jokers++; });
                (r.crossed || []).forEach(p => { stat(p).crossed++; });
            });
        });

        const ppgw = p => p.weeks ? p.points / p.weeks : 0;
        // Sortable leaderboard columns. Every column falls back to the default
        // tie-break chain: Points -> King Maker -> PPGW, then name.
        const lbVal = {
            points: p => p.points,
            kings: p => p.kings || 0,
            jokers: p => p.jokers || 0,
            crossed: p => p.crossed || 0,
            ppgw: p => p.ppgw
        };
        const sortBy = lbVal[state.lbSort] ? state.lbSort : 'points';
        const tieChain = ['points', 'kings', 'ppgw'];
        const sortKeys = [sortBy, ...tieChain.filter(k => k !== sortBy)];
        const leaderboard = Object.entries(stats)
            .map(([name, s]) => ({ name, ...s, ppgw: (s.weeks ? s.points / s.weeks : 0) }))
            .sort((a, b) => {
                for (const k of sortKeys) { const d = lbVal[k](b) - lbVal[k](a); if (d) return d; }
                return a.name.localeCompare(b.name);
            });

        if (leaderboard.length) {
            const top = leaderboard[0];
            html += '<div class="winner-banner"><div class="wt">Season leader</div><div class="wn">&#127942; ' + esc(top.name) + '</div>' +
                '<div class="meta">' + round2(top.points) + ' pts \u00b7 ' + top.ppgw.toFixed(1) + ' per week \u00b7 ' + top.roundWins + ' round wins \u00b7 ' + top.weeks + ' weeks</div></div>';

            const view = state.lbView === 'weekly' ? 'weekly' : 'ranking';
            // Clickable, sortable header cell. Active column shows a caret.
            const caret = ' <span class="sort-caret">▾</span>';
            const th = (label, key, title) => '<th class="sortable ' + (sortBy === key ? 'sorted' : '') + '"' +
                (title ? ' title="' + title + '"' : '') + ' onclick="setLbSort(\'' + key + '\')">' +
                label + (sortBy === key ? caret : '') + '</th>';

            // Ranking table
            const rankingHtml =
                '<div class="lb-sort">Tap a column heading to sort.</div>' +
                '<div class="lb-table-wrap"><table class="lb-table"><thead><tr>' +
                '<th>#</th><th class="col-name">Player</th>' +
                th(ICON_KING.replace('ic ic-king', 'ic ic-sm ic-king'), 'kings', 'King Maker') +
                th(ICON_JOKER.replace('ic ic-joker', 'ic ic-sm ic-joker'), 'jokers', 'Jokers received') +
                th(iconCrossed(true), 'crossed', 'Jokers lifted') +
                th('PPGW', 'ppgw') + th('Pts', 'points') +
                '</tr></thead><tbody>' +
                leaderboard.map((p, i) =>
                    '<tr>' +
                    '<td><span class="lb-rank ' + (i === 0 ? 'r1' : i === 1 ? 'r2' : i === 2 ? 'r3' : '') + '">' + (i + 1) + '</span></td>' +
                    '<td class="col-name">' + esc(p.name) + guestTag(p.name) + '<div class="lb-sub">' + p.roundWins + ' round wins \u00b7 ' + p.weeks + ' weeks</div></td>' +
                    '<td class="' + (sortBy === 'kings' ? 'sorted' : '') + '">' + (p.kings || 0) + '</td>' +
                    '<td class="' + (sortBy === 'jokers' ? 'sorted' : '') + '">' + (p.jokers || 0) + '</td>' +
                    '<td class="' + (sortBy === 'crossed' ? 'sorted' : '') + '">' + (p.crossed || 0) + '</td>' +
                    '<td class="' + (sortBy === 'ppgw' ? 'sorted' : '') + '">' + p.ppgw.toFixed(1) + '</td>' +
                    '<td class="lb-pts-cell ' + (sortBy === 'points' ? 'sorted' : '') + '" style="color:' + (p.points >= 0 ? 'var(--green)' : 'var(--red)') + '">' + round2(p.points) + '</td>' +
                    '</tr>').join('') +
                '</tbody></table></div>' +
                '<div class="hint">' + ICON_KING.replace('ic ic-king', 'ic ic-sm ic-king') + ' King Maker \u00b7 ' + ICON_JOKER.replace('ic ic-joker', 'ic ic-sm ic-joker') + ' Jokers \u00b7 ' + iconCrossed(true) + ' lifted Joker \u00b7 PPGW = points \u00f7 weeks played. Points = tally (badges are counted but add no points).</div>';

            // Weekly breakdown: "points won" (badges add no points).
            const cellFor = (w, p) => {
                if (!weekPlayers(w).includes(p)) return null;
                const base = (w.finalTally && w.finalTally[p] !== undefined) ? w.finalTally[p] : 0;
                return { base };
            };
            const weeklyHtml =
                '<div class="lb-table-wrap"><table class="lb-table wk-table"><thead><tr>' +
                '<th class="col-name">Player</th>' +
                season.map(w => '<th title="' + esc(w.date) + (w.manual ? ' (manual)' : '') + '">W' + w.week + '</th>').join('') +
                '<th>Total</th></tr></thead><tbody>' +
                leaderboard.map(pl => {
                    let total = 0;
                    const cells = season.map(w => {
                        const c = cellFor(w, pl.name);
                        if (!c) return '<td class="wk-empty">\u2013</td>';
                        total += c.base;
                        return '<td>' + round2(c.base) + '</td>';
                    }).join('');
                    return '<tr><td class="col-name">' + esc(pl.name) + guestTag(pl.name) + '</td>' + cells + '<td class="lb-pts-cell">' + round2(total) + '</td></tr>';
                }).join('') +
                '</tbody></table></div>' +
                '<div class="hint">Each cell is that week\'s points won. \u2013 = didn\'t play.</div>';

            html += '<div class="card"><h3>Player leaderboard</h3>' +
                '<div class="lb-view">' +
                '<button class="' + (view === 'ranking' ? 'on' : '') + '" onclick="setLbView(\'ranking\')">Ranking</button>' +
                '<button class="' + (view === 'weekly' ? 'on' : '') + '" onclick="setLbView(\'weekly\')">Weekly breakdown</button>' +
                '</div>' +
                (view === 'ranking' ? rankingHtml : weeklyHtml) +
                '</div>';
        }

        html += '<div class="card"><h3>Season stats</h3>' +
            '<div class="lb-row"><span class="lb-name">Weeks played</span><span class="lb-pts">' + season.length + '</span></div>' +
            '<div class="lb-row"><span class="lb-name">Players in season</span><span class="lb-pts">' + leaderboard.length + '</span></div>' +
            '</div>';

        for (let i = season.length - 1; i >= 0; i--) {
            const w = season[i];
            const rounds = w.rounds || [];
            const t1r = rounds.filter(r => r.winner === 'team1').length;
            const t2r = rounds.filter(r => r.winner === 'team2').length;
            const players = w.players || { team1: [], team2: [] };
            const t1names = players.team1 && players.team1.length ? players.team1.map(esc).join(', ') : '&mdash;';
            const t2names = players.team2 && players.team2.length ? players.team2.map(esc).join(', ') : '&mdash;';
            const s1 = w.manual ? w.teamScores.team1 : t1r;
            const s2 = w.manual ? w.teamScores.team2 : t2r;
            const caption = w.manual ? 'Final score' : 'Rounds won';
            const footer = w.manual
                ? 'Entered manually' + (w.finalTally ? ' \u00b7 points recorded &#10003;' : '')
                : w.games.length + ' games' + (w.finalTally ? ' \u00b7 tally saved &#10003;' : ' \u00b7 tally pending');

            const ko = w.koRounds || [];
            let koLine = '';
            if (ko.length) {
                const lines = ko.map((r, ri) => {
                    const kingTeam = r.winner === 'team1' ? 'Team 1' : 'Team 2';
                    const kingCls = r.winner === 'team1' ? 'ko-t1' : 'ko-t2';
                    const lifted = (r.crossed || []).length
                        ? '<span class="ko-lift">' + iconCrossed(true) + ' ' + r.crossed.map(esc).join(', ') + '</span>'
                        : '';
                    return '<div class="ko-line"><span class="ko-rn">Round ' + (ri + 1) + '</span>' +
                        ICON_KING.replace('ic ic-king', 'ic ic-sm ic-king') +
                        '<span class="' + kingCls + '">' + kingTeam + '</span>' + lifted + '</div>';
                }).join('');
                koLine = '<div class="ko-summary"><div class="ko-summary-title">' + ko.length + '× 12-0 rounds</div>' + lines + '</div>';
            }

            const editing = state.editWeek === i;
            html += '<div class="card">' +
                '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">' +
                '<strong>Week ' + w.week + (w.manual ? ' <span class="badge manual">manual</span>' : '') + '</strong>' +
                '<span style="display:flex;align-items:center;gap:8px;"><span class="meta">' + w.date + '</span>' +
                (editing ? '' : '<button class="btn small subtle" onclick="editWeekOpen(' + i + ')">Edit points</button>') +
                '</span></div>' +
                '<div class="matchup">' +
                '<div class="team t1' + (s1 > s2 ? ' win' : '') + '"><div class="tlabel">Team 1</div>' +
                '<div class="tscore" style="color:var(--blue)">' + s1 + '</div>' +
                '<div class="tplayers">' + t1names + '</div></div>' +
                '<div class="vs">vs</div>' +
                '<div class="team t2' + (s2 > s1 ? ' win' : '') + '"><div class="tlabel">Team 2</div>' +
                '<div class="tscore" style="color:var(--red)">' + s2 + '</div>' +
                '<div class="tplayers">' + t2names + '</div></div>' +
                '</div>' +
                '<div class="score-caption">' + caption + '</div>' +
                '<div class="meta" style="text-align:center;margin-top:8px;">' + footer + '</div>' +
                koLine +
                (editing ? weekEditHtml(w) : '') +
                '</div>';
        }
    }
    document.getElementById('tab-season').innerHTML = html;
}

function weekEditHtml(w) {
    const isManual = w.manual;
    const teamScoreRow = isManual
        ? '<div class="row">' +
          '<div><label>Team 1 score</label><input type="number" step="any" value="' + esc(state.editBuf.score1) + '" oninput="setEditScore(1, this.value)"></div>' +
          '<div><label>Team 2 score</label><input type="number" step="any" value="' + esc(state.editBuf.score2) + '" oninput="setEditScore(2, this.value)"></div>' +
          '</div>' +
          '<div class="hint" style="margin:8px 0;">Team score applies to everyone on the team. Fill a player box only to override that player.</div>'
        : '<div class="hint" style="margin:8px 0;">Edit each player\'s points for this week.</div>';
    const rows = weekPlayers(w).map(p => {
        const arg = "'" + esc(p).replace(/'/g, "\\'") + "'";
        const ph = isManual ? 'team' : '0';
        return '<div class="tally-row"><span class="tname">' + esc(p) + '</span>' +
            '<input type="number" step="any" placeholder="' + ph + '" value="' + esc(state.editBuf.points[p] || '') + '" oninput="setEditPoints(' + arg + ', this.value)"></div>';
    }).join('');
    return '<div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border);">' +
        '<label>Edit points for Week ' + w.week + '</label>' +
        teamScoreRow + rows +
        koEditorHtml('edit', w.players.team1 || [], w.players.team2 || []) +
        '<div class="row" style="margin-top:10px;">' +
        '<button class="btn subtle" onclick="editWeekCancel()">Cancel</button>' +
        '<button class="btn blue" onclick="editWeekSave()">Save changes</button>' +
        '</div></div>';
}

function renderDataTab() {
    document.getElementById('tab-data').innerHTML =
        '<div class="card"><h3>Backup and restore</h3>' +
        '<div class="row">' +
        '<button class="btn green" onclick="exportData()">&#8595; Export JSON</button>' +
        '<button class="btn blue" onclick="document.getElementById(\'import-file\').click()">&#8593; Import JSON</button>' +
        '</div>' +
        '<input id="import-file" type="file" accept=".json" onchange="importData(event)" style="display:none;">' +
        '<div class="hint">When signed in and online, every change is saved to Vercel Blob storage (shared across all devices). Export a JSON copy any time for an extra backup.</div></div>' +
        '<div class="card"><h3>Raw data</h3>' +
        '<textarea readonly>' + esc(JSON.stringify(state.data, null, 2)) + '</textarea>' +
        '<button class="btn subtle" style="margin-top:10px;" onclick="copyJson()">Copy to clipboard</button></div>' +
        '<div class="card"><h3>Account</h3>' +
        '<button class="btn danger" onclick="logout()">Sign out</button></div>';
}

function render() {
    if (state.activeTab === 'season') renderSeasonTab();
    if (state.activeTab === 'roster') renderRosterTab();
    if (state.activeTab === 'data') renderDataTab();
}

localLoad();
render();
serverLoad();
</script>
</body>
</html>
