name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required GitHub repository secrets (Settings → Secrets and variables → Actions):
#   VERCEL_TOKEN       — from https://vercel.com/account/tokens
#   VERCEL_ORG_ID      — from `vercel link` (.vercel/project.json) or Vercel project settings
#   VERCEL_PROJECT_ID  — from `vercel link` (.vercel/project.json) or Vercel project settings
# App credentials (AUTH_USER / AUTH_PASS) and BLOB_READ_WRITE_TOKEN are configured
# in Vercel → Settings → Environment Variables, NOT here.
env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
